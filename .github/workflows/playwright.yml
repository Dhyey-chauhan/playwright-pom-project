# .github/workflows/playwright.yml

name: Playwright Tests

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

  workflow_dispatch:

jobs:
  playwright-tests:
    name: Run Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:

      # Step 1 — Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2 — Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Step 3 — Install dependencies
      - name: Install dependencies
        run: npm ci

      # Step 4 — Install Playwright browsers
      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      # Step 5 — Run UI Tests
      - name: Run UI Tests
        run: npx playwright test --project="UI Tests"
        env:
          UI_BASE_URL: ${{ secrets.UI_BASE_URL }}

      # Step 6 — Run API Tests
      - name: Run API Tests
        run: npx playwright test --project="API Tests"
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}

      # Step 7 — Upload Playwright Report Artifact
      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      # Step 8 — Upload Report to TestDino
      - name: Upload to TestDino
        if: always()
        env:
          TESTDINO_TOKEN: ${{ secrets.TESTDINO_TOKEN }}
        run: |
          npx --package=commander@11 --package=tdpw \
          tdpw upload ./playwright-report \
          --token="$TESTDINO_TOKEN" \
          --upload-html