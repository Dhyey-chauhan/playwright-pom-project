# .github/workflows/playwright.yml

name: Playwright Tests

# WHEN to run — triggers
on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

  workflow_dispatch:

# WHAT to run — jobs
jobs:
  playwright-tests:
    name: Run Playwright Tests
    runs-on: ubuntu-latest

    steps:

      # Step 1 — Download your code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2 — Install Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # Step 3 — Install dependencies
      - name: Install dependencies
        run: npm ci

      # Step 4 — Install Playwright browsers
      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      # ✅ Step 5 — Run ONLY UI tests
      - name: Run UI Tests
        run: npx playwright test --project="UI Tests"
        env:
          UI_BASE_URL: ${{ secrets.UI_BASE_URL }}

      # ✅ Step 6 — Run ONLY API tests
      - name: Run API Tests
        run: npx playwright test --project="API Tests"
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}

      # Step 7 — Upload HTML report (even if tests fail)
      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30